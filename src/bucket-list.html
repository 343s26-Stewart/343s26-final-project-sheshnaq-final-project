<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bucket List — Wanderlist</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/bucket-list.css">
</head>

<body>

  <!-- Shared nav injected by components.js -->
  <div id="nav-placeholder"></div>

  <main id="main-content" class="section bucket-page">

    <header class="section-header">
      <h1 class="section-title">My Bucket List</h1>
      <p id="bucket-count" class="bucket-count"></p>
    </header>

    <!-- Empty state -->
    <section id="empty-state" class="empty-state hidden" aria-live="polite">
      <p>No destinations saved yet.</p>
      <a href="explore.html" class="btn btn-primary">Explore Countries</a>
    </section>

    <!-- Grid -->
    <section id="bucket-grid" class="bucket-grid" aria-label="Saved destinations">
    </section>

  </main>

  <!-- Shared footer injected by components.js -->
  <div id="footer-placeholder"></div>

  <script type="module" src="js/bucket-list.js"></script>
</body>
</html>
